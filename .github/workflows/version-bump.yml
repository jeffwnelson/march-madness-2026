name: Version Bump

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore(version)')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cocogitto
        run: |
          curl -sSL https://github.com/cocogitto/cocogitto/releases/download/7.0.0/cocogitto-7.0.0-x86_64-unknown-linux-musl.tar.gz | tar xz --strip-components=1
          sudo mv cog /usr/local/bin/
          cog --version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          OUTPUT=$(cog bump --auto 2>&1 || echo "no bump")
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Bumped version"; then
            NEW_VER=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.1.0")
            echo "new_version=$NEW_VER" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update VERSION file
        if: steps.bump.outputs.bumped == 'true'
        run: |
          echo "${{ steps.bump.outputs.new_version }}" > VERSION
          git add VERSION
          git commit --amend --no-edit
          git push --force-with-lease --tags
