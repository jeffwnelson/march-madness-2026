name: Version Bump

on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore(version)')"
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cocogitto/cocogitto-action@v3
        id: cocogitto
        with:
          release: true
          check: true
          check-latest-tag-only: true

      - name: Set version output
        id: version
        run: echo "version=${{ steps.cocogitto.outputs.version }}" >> "$GITHUB_OUTPUT"

  update-version-file:
    needs: [version]
    if: needs.version.outputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Update VERSION file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "${{ needs.version.outputs.version }}+${SHORT_SHA}" > VERSION
          git add VERSION
          git commit -m "chore(version): update VERSION to ${{ needs.version.outputs.version }}"
          git push

  release:
    needs: [version, update-version-file]
    if: needs.version.outputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ needs.version.outputs.version }}" --generate-notes
