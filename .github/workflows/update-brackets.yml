name: Update Bracket Data

on:
  schedule:
    - cron: '*/10 18-23 * * *'
    - cron: '*/10 0-7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Fetch latest bracket data
        run: go run . --fetch-only

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/brackets.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/brackets.json
          git commit -m "chore: update bracket data — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Update VERSION with new commit hash
          VER=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "${VER}+${SHORT_SHA}" > VERSION
          git add VERSION
          git commit --amend --no-edit
          git push
