name: Update Bracket Data

on:
  schedule:
    - cron: '*/10 18-23 * * *'
    - cron: '*/10 0-7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Fetch latest bracket data
        run: go run ./backend --fetch-only

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/leaderboard.json data/bracket-picks.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json data/bracket-picks.json
          git commit -m "chore: update bracket data — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Update VERSION with new commit hash
          VER=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "${VER}+${SHORT_SHA}" > VERSION
          git add VERSION
          git commit --amend --no-edit
          git push

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Pull latest (includes data update)
        run: git pull origin master

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
