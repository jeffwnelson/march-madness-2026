name: Update Bracket Data

on:
  schedule:
    - cron: '*/10 18-23 * * *'
    - cron: '*/10 0-7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Fetch ESPN data
        run: |
          mkdir -p data/espn
          curl -s "https://gambit-api.fantasy.espn.com/apis/v1/challenges/tournament-challenge-bracket-2026" > data/espn/challenge.json
          curl -s "https://gambit-api.fantasy.espn.com/apis/v1/challenges/tournament-challenge-bracket-2026/groups/af223df6-96d0-46e7-b00d-1b590dc67888?view=entries&limit=50" > data/espn/group.json

      - name: Generate data files
        run: go run ./backend/

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/data.js data/leaderboard.js || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +%Y%m%d.%H%M%S)
          echo "${TIMESTAMP}+${SHORT_SHA}" > VERSION
          git add data/data.js data/leaderboard.js data/espn/ VERSION
          git commit -m "chore: update bracket data — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Pull latest (includes data update)
        run: git pull origin master

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
