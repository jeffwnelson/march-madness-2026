<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March Madness 2026 — Bracket Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --card: #1a1a2e;
  --border: #2a2a3e;
  --accent: #ff6b35;
  --accent-dim: #cc5529;
  --success: #22c55e;
  --danger: #ef4444;
  --muted: #94a3b8;
  --text: #e2e8f0;
  --white: #f8fafc;
  --font-display: 'Oswald', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}
/* Header */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 1rem; }
.header h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.6rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--white);
}
.header h1 span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 1rem; }
.last-updated { font-size: 0.75rem; color: var(--muted); }
.btn-refresh {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 0.5rem 1rem;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transition: background 0.2s;
}
.btn-refresh:hover { background: var(--accent-dim); }
.btn-refresh .spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  display: none;
}
.btn-refresh.loading .spinner {
  display: inline-block;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Tabs */
.tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  gap: 0;
}
.tab-btn {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  background: none;
  border: none;
  padding: 0.85rem 1.5rem;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* Tab content */
.tab-content { display: none; padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
.tab-content.active { display: block; animation: fadeIn 0.3s ease; }
#tab-consensus.active { display: block; max-width: 100%; padding: 0.75rem; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ==================== BRACKET VIEW ==================== */
.bracket-wrapper {
  overflow-x: auto;
  padding: 0.5rem 0;
}
.bracket-container {
  display: grid;
  grid-template-columns: 160px 160px 160px 200px 160px 160px 160px;
  gap: 0;
  min-width: 1200px;
  position: relative;
}
.bracket-round-header {
  font-family: var(--font-display);
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-align: center;
  padding: 0.4rem 0.25rem 0.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.bracket-round-header .pts {
  display: block;
  font-size: 0.6rem;
  color: var(--accent);
  letter-spacing: 0;
  font-weight: 600;
}
.bracket-region-label {
  font-family: var(--font-display);
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  text-align: center;
  padding: 0.3rem 0;
  background: var(--bg);
}
.bracket-col {
  display: flex;
  flex-direction: column;
}
/* Matchup card */
.bk-matchup {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin: 2px 4px;
  font-size: 0.72rem;
  position: relative;
  flex-shrink: 0;
}
.bk-matchup.decided { border-color: rgba(34,197,94,0.3); }
.bk-team {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 3px 5px;
  min-height: 24px;
}
.bk-team + .bk-team {
  border-top: 1px solid var(--border);
}
.bk-team.winner {
  background: rgba(34,197,94,0.08);
}
.bk-team.winner .bk-team-name { color: var(--success); font-weight: 700; }
.bk-team.loser { opacity: 0.45; }
.bk-team-logo {
  width: 18px;
  height: 18px;
  object-fit: contain;
  border-radius: 2px;
  flex-shrink: 0;
}
.bk-team-seed {
  font-size: 0.6rem;
  color: var(--muted);
  font-weight: 700;
  min-width: 12px;
  text-align: center;
}
.bk-team-name {
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.bk-team-count {
  font-family: var(--font-display);
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--muted);
  white-space: nowrap;
  margin-left: auto;
}
.bk-team.winner .bk-team-count { color: var(--success); }
.bk-team.favorite .bk-team-count { color: var(--accent); }
.bk-bar {
  height: 3px;
  display: flex;
  background: var(--border);
}
.bk-bar-seg {
  height: 100%;
  transition: width 0.3s ease;
}
/* Empty slot for later rounds where we don't have enough data */
.bk-empty {
  background: var(--bg2);
  border: 1px dashed var(--border);
  border-radius: 6px;
  margin: 2px 4px;
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: var(--muted);
  opacity: 0.5;
}
/* Spacers to vertically align rounds */
.bk-spacer {
  flex: 1;
  min-height: 2px;
}
.bk-spacer-half {
  flex: 0.5;
  min-height: 1px;
}
/* Connecting lines */
.bk-connector {
  position: relative;
  flex-shrink: 0;
  min-height: 2px;
}
/* Center column for final four */
.bracket-center {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  justify-content: center;
  padding: 0;
}
.bk-final-label {
  font-family: var(--font-display);
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-align: center;
  padding: 0.25rem 0;
}
.bk-champion-box {
  background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,107,53,0.05));
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 8px;
  margin: 4px;
  text-align: center;
}
.bk-champion-title {
  font-family: var(--font-display);
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 4px;
}

/* Region grid (kept for what-if tab) */
.region-header {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  padding: 0.75rem 1rem;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  color: var(--accent);
}
.team-logo {
  width: 20px;
  height: 20px;
  object-fit: contain;
  border-radius: 2px;
}
.team-seed {
  font-size: 0.65rem;
  color: var(--muted);
  font-weight: 700;
  min-width: 14px;
}
.team-name {
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.winner-check { color: var(--success); font-size: 0.7rem; margin-left: 0.25rem; }

/* Tab 2: Uniqueness */
.uniqueness-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}
.uniqueness-table th {
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--muted);
  text-align: left;
  padding: 0.75rem;
  border-bottom: 2px solid var(--border);
}
.uniqueness-table td {
  padding: 0.65rem 0.75rem;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.uniqueness-table tr:hover td { background: rgba(255,255,255,0.02); }
.rank-num {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--muted);
  width: 32px;
  text-align: center;
}
.score-big {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
}
.score-bar {
  width: 120px;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s ease;
}
.badge {
  font-family: var(--font-display);
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  margin-left: 0.5rem;
}
.badge-unique { background: var(--accent); color: #fff; }
.badge-mainstream { background: var(--border); color: var(--muted); }

/* Similarity matrix */
.similarity-toggle {
  margin-top: 2rem;
  margin-bottom: 1rem;
}
.similarity-toggle button {
  font-family: var(--font-display);
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.5rem 1rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}
.similarity-toggle button:hover { border-color: var(--accent); color: var(--text); }
.similarity-wrap {
  overflow-x: auto;
  display: none;
  animation: fadeIn 0.3s ease;
}
.similarity-wrap.show { display: block; }
.sim-table {
  border-collapse: collapse;
  font-size: 0.7rem;
  min-width: 100%;
}
.sim-table th, .sim-table td {
  padding: 0.4rem 0.5rem;
  border: 1px solid var(--border);
  text-align: center;
  white-space: nowrap;
}
.sim-table th {
  background: var(--bg2);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.65rem;
  text-transform: uppercase;
  color: var(--muted);
}
.sim-table td { font-family: var(--font-display); font-weight: 600; }
.sim-cell-self { background: var(--border); color: var(--muted); }

/* Tab 3: What-If */
.whatif-layout {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 1.5rem;
  align-items: start;
}
@media (max-width: 900px) {
  .whatif-layout { grid-template-columns: 1fr; }
}
.whatif-bracket {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
}
@media (max-width: 1100px) { .whatif-bracket { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .whatif-bracket { grid-template-columns: 1fr; } }

.whatif-region {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.whatif-matchup {
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.whatif-matchup:last-child { border-bottom: none; }
.whatif-team {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.45rem 0.65rem;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 0.78rem;
  border-left: 3px solid transparent;
}
.whatif-team:hover { background: rgba(255,255,255,0.04); }
.whatif-team.picked-correct {
  background: rgba(34,197,94,0.1);
  border-left-color: var(--success);
}
.whatif-team.picked-correct .team-name { color: var(--success); font-weight: 700; }
.whatif-team.picked-incorrect {
  background: rgba(239,68,68,0.08);
  border-left-color: var(--danger);
  opacity: 0.5;
}
.whatif-team.picked-incorrect .team-name { text-decoration: line-through; color: var(--danger); }
.whatif-team.disabled { pointer-events: none; opacity: 0.35; }
.whatif-divider {
  height: 1px;
  background: var(--border);
}

/* Leaderboard panel */
.leaderboard-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  position: sticky;
  top: 80px;
}
.leaderboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.75rem 1rem;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.leaderboard-header h3 {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
}
.btn-reset {
  font-family: var(--font-display);
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.35rem 0.75rem;
  border: 1px solid var(--danger);
  border-radius: 4px;
  background: transparent;
  color: var(--danger);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-reset:hover { background: var(--danger); color: #fff; }
.lb-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem;
}
.lb-table th {
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--muted);
  text-align: left;
  padding: 0.5rem 0.6rem;
  border-bottom: 1px solid var(--border);
}
.lb-table td {
  padding: 0.45rem 0.6rem;
  border-bottom: 1px solid var(--border);
}
.lb-table tr:hover td { background: rgba(255,255,255,0.02); }
.lb-entry-name {
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 140px;
  display: inline-block;
}
.lb-score {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.95rem;
}
.lb-max {
  font-family: var(--font-display);
  font-weight: 600;
  color: var(--muted);
  font-size: 0.8rem;
}
.lb-delta {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.8rem;
}
.delta-pos { color: var(--success); }
.delta-neg { color: var(--danger); }
.delta-zero { color: var(--muted); }

/* Loading */
.loading-msg {
  text-align: center;
  padding: 4rem;
  color: var(--muted);
  font-size: 1.1rem;
}
.section-title {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 1rem;
  color: var(--white);
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>March Madness <span>2026</span></h1>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="btn-refresh" id="btnRefresh" onclick="refreshData()">
      <div class="spinner"></div>
      Refresh
    </button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="consensus" onclick="switchTab('consensus')">Consensus Picks</button>
  <button class="tab-btn" data-tab="uniqueness" onclick="switchTab('uniqueness')">Bracket Uniqueness</button>
  <button class="tab-btn" data-tab="whatif" onclick="switchTab('whatif')">What-If Simulator</button>
</div>

<div class="tab-content active" id="tab-consensus">
  <div class="loading-msg" id="loading-consensus">Loading bracket data...</div>
</div>
<div class="tab-content" id="tab-uniqueness">
  <div class="loading-msg" id="loading-uniqueness">Loading bracket data...</div>
</div>
<div class="tab-content" id="tab-whatif">
  <div class="loading-msg" id="loading-whatif">Loading bracket data...</div>
</div>

<script>
// ============================================================
// State
// ============================================================
let DATA = null;
const REGION_NAMES = { 1: 'East', 2: 'South', 3: 'West', 4: 'Midwest' };
const ROUND_KEYS = ['r64','r32','sweet16','elite8','finalFour','championship'];
const ROUND_LABELS = { r64:'R64', r32:'R32', sweet16:'Sweet 16', elite8:'Elite 8', finalFour:'Final Four', championship:'Championship' };
let whatIfState = null;

// ============================================================
// Tab switching
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
}

// ============================================================
// Data loading
// ============================================================
async function loadData() {
  const res = await fetch('/api/brackets');
  DATA = await res.json();
  document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date(DATA.lastUpdated).toLocaleString();
  renderConsensus();
  renderUniqueness();
  initWhatIf();
}

async function refreshData() {
  const btn = document.getElementById('btnRefresh');
  btn.classList.add('loading');
  btn.disabled = true;
  try {
    await fetch('/api/refresh', { method: 'POST' });
    await loadData();
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ============================================================
// Tab 1: Consensus Bracket View
// ============================================================
function renderConsensus() {
  const container = document.getElementById('tab-consensus');
  const total = DATA.brackets.length;

  // Build R64 matchup map sorted by displayOrder
  const r64 = DATA.matchups.filter(m => m.round === 1).sort((a, b) => a.displayOrder - b.displayOrder);
  const r64ById = {};
  r64.forEach(m => r64ById[m.id] = m);

  // For each R64 matchup, count picks
  const r64Picks = {};
  r64.forEach(m => {
    let t1 = 0, t2 = 0;
    DATA.brackets.forEach(b => {
      const pick = b.picks.r64.find(p => p.matchupId === m.id);
      if (pick) {
        if (pick.pickedTeamId === m.team1Id) t1++;
        else if (pick.pickedTeamId === m.team2Id) t2++;
      }
    });
    r64Picks[m.id] = { [m.team1Id]: t1, [m.team2Id]: t2 };
  });

  // Build later round slots
  // R32: 16 slots, each from pairs [0,1],[2,3],...,[30,31]
  // S16: 8 slots from quads [0-3],[4-7],...,[28-31]
  // E8:  4 slots from octets [0-7],[8-15],[16-23],[24-31]
  // FF:  2 slots: [0-15], [16-31]
  // Champ: 1 slot

  function buildSlotPicks(roundKey, slotSize) {
    const numSlots = 32 / slotSize;
    const slots = [];
    for (let s = 0; s < numSlots; s++) {
      const minDO = s * slotSize;
      const maxDO = minDO + slotSize - 1;
      // Find all R64 matchup IDs in this range
      const r64IdsInSlot = new Set();
      r64.forEach(m => {
        if (m.displayOrder >= minDO && m.displayOrder <= maxDO) {
          r64IdsInSlot.add(m.id);
        }
      });
      // Count picks for this slot
      const counts = {};
      DATA.brackets.forEach(b => {
        (b.picks[roundKey] || []).forEach(p => {
          if (r64IdsInSlot.has(p.matchupId)) {
            counts[p.pickedTeamId] = (counts[p.pickedTeamId] || 0) + 1;
          }
        });
      });
      slots.push(counts);
    }
    return slots;
  }

  const r32Slots = buildSlotPicks('r32', 2);   // 16 slots
  const s16Slots = buildSlotPicks('sweet16', 4); // 8 slots
  const e8Slots  = buildSlotPicks('elite8', 8);  // 4 slots
  const ffSlots  = buildSlotPicks('finalFour', 16); // 2 slots

  // Championship
  const champCounts = {};
  DATA.brackets.forEach(b => {
    (b.picks.championship || []).forEach(p => {
      champCounts[p.pickedTeamId] = (champCounts[p.pickedTeamId] || 0) + 1;
    });
  });

  // Helper to render a matchup card given team counts object {teamId: count, ...}
  // winnerId is set if decided, team1Id/team2Id define the seeding order
  function renderCard(teamCounts, winnerId) {
    const entries = Object.entries(teamCounts).sort((a, b) => b[1] - a[1]);
    if (entries.length === 0) return '<div class="bk-empty">TBD</div>';

    const totalPicks = entries.reduce((s, e) => s + e[1], 0) || 1;
    const maxCount = entries.length > 0 ? entries[0][1] : 0;
    const decided = !!winnerId;

    let html = `<div class="bk-matchup${decided ? ' decided' : ''}">`;
    // Show top 2 teams (or all if just 1)
    const showTeams = entries.slice(0, 2);
    // If there's a winner, make sure they're in the list
    if (winnerId && !showTeams.find(e => e[0] === winnerId)) {
      const we = entries.find(e => e[0] === winnerId);
      if (we) showTeams[1] = we;
    }

    showTeams.forEach(([tid, count]) => {
      const team = DATA.teams[tid];
      if (!team) return;
      const isWinner = winnerId === tid;
      const isLoser = decided && winnerId !== tid;
      const isFav = !decided && count === maxCount && entries.length > 1;
      let cls = 'bk-team';
      if (isWinner) cls += ' winner';
      if (isLoser) cls += ' loser';
      if (isFav) cls += ' favorite';
      html += `<div class="${cls}">
        <img class="bk-team-logo" src="${team.logo}" alt="${team.abbrev}" loading="lazy">
        <span class="bk-team-seed">${team.seed}</span>
        <span class="bk-team-name">${team.abbrev}</span>
        <span class="bk-team-count">${count}/${total}</span>
      </div>`;
    });

    // If only 1 team, show an empty second row
    if (showTeams.length < 2) {
      html += `<div class="bk-team" style="opacity:0.2;min-height:24px"><span class="bk-team-name" style="color:var(--muted)">---</span></div>`;
    }

    // Consensus bar
    if (entries.length >= 2) {
      const pct1 = Math.round(showTeams[0][1] / totalPicks * 100);
      const pct2 = 100 - pct1;
      html += `<div class="bk-bar">
        <div class="bk-bar-seg" style="width:${pct1}%;background:var(--accent)"></div>
        <div class="bk-bar-seg" style="width:${pct2}%;background:var(--muted)"></div>
      </div>`;
    }
    html += '</div>';
    return html;
  }

  // Render R64 matchup card
  function renderR64Card(matchup) {
    const picks = r64Picks[matchup.id];
    return renderCard(picks, matchup.winnerId);
  }

  // Now build the 7-column layout
  // Left side: col 0 = R64 region1 top + region2 bottom
  //            col 1 = R32 for regions 1+2
  //            col 2 = S16 for regions 1+2
  // Center:    col 3 = E8 + FF + Championship
  // Right side: col 4 = S16 for regions 3+4
  //             col 5 = R32 for regions 3+4
  //             col 6 = R64 region3 top + region4 bottom

  // Region 1: displayOrder 0-7, Region 2: 8-15
  // Region 3: displayOrder 16-23, Region 4: 24-31

  function buildColumn(matchupCards, regionLabels) {
    let html = '';
    regionLabels.forEach((label, ri) => {
      if (label) {
        html += `<div class="bracket-region-label">${label}</div>`;
      }
      const cards = matchupCards[ri];
      cards.forEach((card, i) => {
        html += card;
      });
    });
    return html;
  }

  // R64 columns (8 games per region)
  const leftR64Region1 = r64.filter(m => m.region === 1).sort((a, b) => a.displayOrder - b.displayOrder);
  const leftR64Region2 = r64.filter(m => m.region === 2).sort((a, b) => a.displayOrder - b.displayOrder);
  const rightR64Region3 = r64.filter(m => m.region === 3).sort((a, b) => a.displayOrder - b.displayOrder);
  const rightR64Region4 = r64.filter(m => m.region === 4).sort((a, b) => a.displayOrder - b.displayOrder);

  let html = '<div class="bracket-wrapper"><div class="bracket-container">';

  // === HEADERS ===
  html += '<div class="bracket-round-header">R64<span class="pts">10 pts</span></div>';
  html += '<div class="bracket-round-header">R32<span class="pts">20 pts</span></div>';
  html += '<div class="bracket-round-header">Sweet 16<span class="pts">40 pts</span></div>';
  html += '<div class="bracket-round-header">Final Rounds<span class="pts">80-320 pts</span></div>';
  html += '<div class="bracket-round-header">Sweet 16<span class="pts">40 pts</span></div>';
  html += '<div class="bracket-round-header">R32<span class="pts">20 pts</span></div>';
  html += '<div class="bracket-round-header">R64<span class="pts">10 pts</span></div>';

  // === COLUMN 0: Left R64 (Region 1 top, Region 2 bottom) ===
  html += '<div class="bracket-col">';
  html += `<div class="bracket-region-label">${REGION_NAMES[1]}</div>`;
  leftR64Region1.forEach(m => { html += renderR64Card(m); });
  html += `<div class="bracket-region-label" style="margin-top:4px">${REGION_NAMES[2]}</div>`;
  leftR64Region2.forEach(m => { html += renderR64Card(m); });
  html += '</div>';

  // === COLUMN 1: Left R32 (slots 0-3 for region1, 4-7 for region2) ===
  html += '<div class="bracket-col">';
  html += '<div class="bracket-region-label">&nbsp;</div>';
  // Region 1: R32 slots 0-3 (displayOrder pairs 0-1, 2-3, 4-5, 6-7)
  for (let i = 0; i < 4; i++) {
    html += '<div class="bk-spacer-half"></div>';
    html += renderCard(r32Slots[i], null);
    html += '<div class="bk-spacer-half"></div>';
  }
  html += '<div class="bracket-region-label">&nbsp;</div>';
  // Region 2: R32 slots 4-7 (displayOrder pairs 8-9, 10-11, 12-13, 14-15)
  for (let i = 4; i < 8; i++) {
    html += '<div class="bk-spacer-half"></div>';
    html += renderCard(r32Slots[i], null);
    html += '<div class="bk-spacer-half"></div>';
  }
  html += '</div>';

  // === COLUMN 2: Left S16 (slots 0-1 for region1, 2-3 for region2) ===
  html += '<div class="bracket-col">';
  html += '<div class="bracket-region-label">&nbsp;</div>';
  // Region 1: S16 slots 0-1
  for (let i = 0; i < 2; i++) {
    html += '<div class="bk-spacer"></div>';
    html += renderCard(s16Slots[i], null);
    html += '<div class="bk-spacer"></div>';
  }
  html += '<div class="bracket-region-label">&nbsp;</div>';
  // Region 2: S16 slots 2-3
  for (let i = 2; i < 4; i++) {
    html += '<div class="bk-spacer"></div>';
    html += renderCard(s16Slots[i], null);
    html += '<div class="bk-spacer"></div>';
  }
  html += '</div>';

  // === COLUMN 3: CENTER (E8 + FF + Championship) ===
  html += '<div class="bracket-col bracket-center">';
  html += '<div class="bracket-region-label">&nbsp;</div>';

  // E8 slot 0 (Region 1 champion)
  html += '<div class="bk-spacer"></div>';
  html += '<div class="bk-final-label">Elite 8 - ' + REGION_NAMES[1] + '</div>';
  html += renderCard(e8Slots[0], null);

  // FF semifinal 1 (regions 1 vs 2)
  html += '<div class="bk-spacer-half"></div>';
  html += '<div class="bk-final-label">Final Four</div>';
  html += renderCard(ffSlots[0], null);

  // E8 slot 1 (Region 2 champion)
  html += '<div class="bk-spacer-half"></div>';
  html += '<div class="bk-final-label">Elite 8 - ' + REGION_NAMES[2] + '</div>';
  html += renderCard(e8Slots[1], null);

  // Championship
  html += '<div class="bk-spacer-half"></div>';
  html += '<div class="bk-champion-box">';
  html += '<div class="bk-champion-title">Championship</div>';
  const champEntries = Object.entries(champCounts).sort((a, b) => b[1] - a[1]);
  if (champEntries.length > 0) {
    champEntries.slice(0, 3).forEach(([tid, count]) => {
      const team = DATA.teams[tid];
      if (!team) return;
      html += `<div class="bk-team" style="justify-content:center;padding:2px 4px">
        <img class="bk-team-logo" src="${team.logo}" alt="${team.abbrev}" loading="lazy">
        <span class="bk-team-seed">${team.seed}</span>
        <span class="bk-team-name" style="flex:0">${team.abbrev}</span>
        <span class="bk-team-count">${count}/${total}</span>
      </div>`;
    });
  } else {
    html += '<div style="color:var(--muted);font-size:0.65rem">TBD</div>';
  }
  html += '</div>';

  // E8 slot 2 (Region 3 champion)
  html += '<div class="bk-spacer-half"></div>';
  html += '<div class="bk-final-label">Elite 8 - ' + REGION_NAMES[3] + '</div>';
  html += renderCard(e8Slots[2], null);

  // FF semifinal 2 (regions 3 vs 4)
  html += '<div class="bk-spacer-half"></div>';
  html += '<div class="bk-final-label">Final Four</div>';
  html += renderCard(ffSlots[1], null);

  // E8 slot 3 (Region 4 champion)
  html += '<div class="bk-spacer-half"></div>';
  html += '<div class="bk-final-label">Elite 8 - ' + REGION_NAMES[4] + '</div>';
  html += renderCard(e8Slots[3], null);
  html += '<div class="bk-spacer"></div>';
  html += '</div>';

  // === COLUMN 4: Right S16 (slots 4-5 for region3, 6-7 for region4) ===
  html += '<div class="bracket-col">';
  html += '<div class="bracket-region-label">&nbsp;</div>';
  for (let i = 4; i < 6; i++) {
    html += '<div class="bk-spacer"></div>';
    html += renderCard(s16Slots[i], null);
    html += '<div class="bk-spacer"></div>';
  }
  html += '<div class="bracket-region-label">&nbsp;</div>';
  for (let i = 6; i < 8; i++) {
    html += '<div class="bk-spacer"></div>';
    html += renderCard(s16Slots[i], null);
    html += '<div class="bk-spacer"></div>';
  }
  html += '</div>';

  // === COLUMN 5: Right R32 (slots 8-11 for region3, 12-15 for region4) ===
  html += '<div class="bracket-col">';
  html += '<div class="bracket-region-label">&nbsp;</div>';
  for (let i = 8; i < 12; i++) {
    html += '<div class="bk-spacer-half"></div>';
    html += renderCard(r32Slots[i], null);
    html += '<div class="bk-spacer-half"></div>';
  }
  html += '<div class="bracket-region-label">&nbsp;</div>';
  for (let i = 12; i < 16; i++) {
    html += '<div class="bk-spacer-half"></div>';
    html += renderCard(r32Slots[i], null);
    html += '<div class="bk-spacer-half"></div>';
  }
  html += '</div>';

  // === COLUMN 6: Right R64 (Region 3 top, Region 4 bottom) ===
  html += '<div class="bracket-col">';
  html += `<div class="bracket-region-label">${REGION_NAMES[3]}</div>`;
  rightR64Region3.forEach(m => { html += renderR64Card(m); });
  html += `<div class="bracket-region-label" style="margin-top:4px">${REGION_NAMES[4]}</div>`;
  rightR64Region4.forEach(m => { html += renderR64Card(m); });
  html += '</div>';

  html += '</div></div>'; // close bracket-container and bracket-wrapper
  container.innerHTML = html;
}

// ============================================================
// Tab 2: Bracket Uniqueness
// ============================================================
function getPickVector(bracket) {
  const picks = [];
  ROUND_KEYS.forEach(round => {
    (bracket.picks[round] || []).forEach(pick => picks.push(pick.pickedTeamId));
  });
  return picks;
}

function hammingDistance(v1, v2) {
  let diff = 0;
  const len = Math.min(v1.length, v2.length);
  for (let i = 0; i < len; i++) {
    if (v1[i] !== v2[i]) diff++;
  }
  return diff;
}

function renderUniqueness() {
  const container = document.getElementById('tab-uniqueness');
  const brackets = DATA.brackets;
  const vectors = brackets.map(b => getPickVector(b));
  const vecLen = vectors[0] ? vectors[0].length : 1;

  // Pairwise distances
  const distances = [];
  for (let i = 0; i < brackets.length; i++) {
    distances[i] = [];
    for (let j = 0; j < brackets.length; j++) {
      distances[i][j] = i === j ? 0 : hammingDistance(vectors[i], vectors[j]);
    }
  }

  // Originality score = avg distance / vecLen * 100
  const scores = brackets.map((b, i) => {
    const others = distances[i].filter((_, j) => j !== i);
    const avg = others.reduce((s, v) => s + v, 0) / (others.length || 1);
    return { idx: i, bracket: b, score: Math.round(avg / vecLen * 100 * 10) / 10 };
  }).sort((a, b) => b.score - a.score);

  const maxScore = Math.max(...scores.map(s => s.score));
  const minScore = Math.min(...scores.map(s => s.score));

  let html = '<div class="section-title">Originality Leaderboard</div>';
  html += '<div style="overflow-x:auto"><table class="uniqueness-table"><thead><tr>';
  html += '<th>#</th><th>Bracket</th><th>Member</th><th>Score</th><th></th><th></th>';
  html += '</tr></thead><tbody>';

  scores.forEach((s, rank) => {
    const pct = maxScore > 0 ? (s.score / maxScore * 100) : 0;
    const barColor = s.score === maxScore ? 'var(--accent)' : s.score === minScore ? 'var(--muted)' : 'var(--accent)';
    let badge = '';
    if (rank === 0) badge = '<span class="badge badge-unique">Most Unique</span>';
    if (rank === scores.length - 1) badge = '<span class="badge badge-mainstream">Most Mainstream</span>';

    html += `<tr>
      <td class="rank-num">${rank + 1}</td>
      <td style="font-weight:600">${escHtml(s.bracket.entryName)}${badge}</td>
      <td style="color:var(--muted)">${escHtml(s.bracket.member)}</td>
      <td><span class="score-big" style="color:${barColor}">${s.score.toFixed(1)}%</span></td>
      <td><div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${barColor}"></div></div></td>
      <td></td>
    </tr>`;
  });
  html += '</tbody></table></div>';

  // Similarity matrix toggle
  html += '<div class="similarity-toggle"><button onclick="toggleSimilarity()">Show Pairwise Similarity Matrix</button></div>';
  html += '<div class="similarity-wrap" id="simMatrix">';
  html += renderSimilarityMatrix(brackets, vectors, vecLen);
  html += '</div>';

  container.innerHTML = html;
}

function renderSimilarityMatrix(brackets, vectors, vecLen) {
  let html = '<table class="sim-table"><thead><tr><th></th>';
  brackets.forEach(b => { html += `<th>${escHtml(b.entryName).substring(0, 12)}</th>`; });
  html += '</tr></thead><tbody>';

  for (let i = 0; i < brackets.length; i++) {
    html += `<tr><th>${escHtml(brackets[i].entryName).substring(0, 12)}</th>`;
    for (let j = 0; j < brackets.length; j++) {
      if (i === j) {
        html += '<td class="sim-cell-self">-</td>';
      } else {
        const dist = hammingDistance(vectors[i], vectors[j]);
        const similarity = Math.round((1 - dist / vecLen) * 100);
        const hue = similarity > 70 ? '0' : similarity > 40 ? '30' : '140';
        const sat = Math.abs(similarity - 50) * 2;
        html += `<td style="background:hsla(${hue},${sat}%,50%,0.15);color:var(--text)">${similarity}%</td>`;
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

function toggleSimilarity() {
  document.getElementById('simMatrix').classList.toggle('show');
}

// ============================================================
// Tab 3: What-If Simulator
// ============================================================
function initWhatIf() {
  // Deep clone
  whatIfState = {
    matchups: JSON.parse(JSON.stringify(DATA.matchups)),
    brackets: JSON.parse(JSON.stringify(DATA.brackets)),
    pointsPerRound: DATA.pointsPerRound,
    originalScores: DATA.brackets.map(b => b.score),
    originalMaxPossible: DATA.brackets.map(b => b.maxPossible)
  };
  renderWhatIf();
}

function applyWhatIf(matchupId, winnerTeamId) {
  const matchup = whatIfState.matchups.find(m => m.id === matchupId);
  if (!matchup) return;
  const loserId = matchup.team1Id === winnerTeamId ? matchup.team2Id : matchup.team1Id;
  matchup.winnerId = winnerTeamId;

  whatIfState.brackets.forEach(bracket => {
    let score = 0, maxPossible = 0;
    ROUND_KEYS.forEach((roundKey, idx) => {
      const pts = whatIfState.pointsPerRound[idx];
      (bracket.picks[roundKey] || []).forEach(pick => {
        // Eliminate ALL picks for the losing team across all rounds
        if (pick.pickedTeamId === loserId && pick.result === 'UNDECIDED') {
          pick.result = 'ELIMINATED';
        }
        // Mark correct for this specific matchup
        if (pick.matchupId === matchupId && pick.pickedTeamId === winnerTeamId && pick.result !== 'CORRECT') {
          pick.result = 'CORRECT';
        }
        // Mark incorrect for this specific matchup
        if (pick.matchupId === matchupId && pick.pickedTeamId === loserId) {
          pick.result = 'INCORRECT';
        }
        // Tally
        if (pick.result === 'CORRECT') score += pts;
        if (pick.result === 'CORRECT' || pick.result === 'UNDECIDED') maxPossible += pts;
      });
    });
    bracket.score = score;
    bracket.maxPossible = maxPossible;
  });
  renderWhatIf();
}

function resetWhatIf() {
  initWhatIf();
}

function renderWhatIf() {
  const container = document.getElementById('tab-whatif');
  let html = '<div class="whatif-layout">';

  // Left: bracket matchups
  html += '<div>';
  html += '<div class="section-title">Select Winners</div>';
  html += '<div class="whatif-bracket">';

  const matchups = whatIfState.matchups.filter(m => m.round === 1);
  const byRegion = {};
  matchups.forEach(m => {
    if (!byRegion[m.region]) byRegion[m.region] = [];
    byRegion[m.region].push(m);
  });

  [1,2,3,4].forEach(regionId => {
    const regionMatchups = (byRegion[regionId] || []).sort((a, b) => a.displayOrder - b.displayOrder);
    html += `<div class="whatif-region"><div class="region-header">${REGION_NAMES[regionId]}</div>`;
    regionMatchups.forEach(m => {
      const team1 = DATA.teams[m.team1Id];
      const team2 = DATA.teams[m.team2Id];
      if (!team1 || !team2) return;
      const decided = !!m.winnerId;
      const t1Won = m.winnerId === m.team1Id;
      const t2Won = m.winnerId === m.team2Id;

      let t1Class = '';
      let t2Class = '';
      if (decided) {
        t1Class = t1Won ? 'picked-correct' : 'picked-incorrect';
        t2Class = t2Won ? 'picked-correct' : 'picked-incorrect';
      }

      const clickable = !decided;
      html += '<div class="whatif-matchup">';
      html += `<div class="whatif-team ${t1Class}" ${clickable ? `onclick="applyWhatIf('${m.id}','${m.team1Id}')"` : ''}>
        <img class="team-logo" src="${team1.logo}" alt="${team1.abbrev}" loading="lazy">
        <span class="team-seed">${team1.seed}</span>
        <span class="team-name">${team1.name}</span>
      </div>`;
      html += '<div class="whatif-divider"></div>';
      html += `<div class="whatif-team ${t2Class}" ${clickable ? `onclick="applyWhatIf('${m.id}','${m.team2Id}')"` : ''}>
        <img class="team-logo" src="${team2.logo}" alt="${team2.abbrev}" loading="lazy">
        <span class="team-seed">${team2.seed}</span>
        <span class="team-name">${team2.name}</span>
      </div>`;
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div></div>';

  // Right: leaderboard
  html += '<div class="leaderboard-panel">';
  html += '<div class="leaderboard-header"><h3>Leaderboard</h3><button class="btn-reset" onclick="resetWhatIf()">Reset</button></div>';

  const sorted = whatIfState.brackets.map((b, i) => ({
    bracket: b,
    idx: i,
    delta: b.score - whatIfState.originalScores[i]
  })).sort((a, b) => b.bracket.score - a.bracket.score || b.bracket.maxPossible - a.bracket.maxPossible);

  html += '<table class="lb-table"><thead><tr><th>#</th><th>Bracket</th><th>Pts</th><th>Max</th><th>+/-</th></tr></thead><tbody>';
  sorted.forEach((s, rank) => {
    const deltaClass = s.delta > 0 ? 'delta-pos' : s.delta < 0 ? 'delta-neg' : 'delta-zero';
    const deltaStr = s.delta > 0 ? '+' + s.delta : s.delta === 0 ? '-' : '' + s.delta;
    html += `<tr>
      <td class="rank-num" style="font-size:0.85rem">${rank + 1}</td>
      <td><span class="lb-entry-name" title="${escHtml(s.bracket.entryName)}">${escHtml(s.bracket.entryName)}</span></td>
      <td><span class="lb-score">${s.bracket.score}</span></td>
      <td><span class="lb-max">${s.bracket.maxPossible}</span></td>
      <td><span class="lb-delta ${deltaClass}">${deltaStr}</span></td>
    </tr>`;
  });
  html += '</tbody></table></div>';

  html += '</div>';
  container.innerHTML = html;
}

// ============================================================
// Helpers
// ============================================================
function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ============================================================
// Init
// ============================================================
loadData();
